<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Zundamon</title>
        <script src="/live2dcubismcore.min.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
        <style>
            :root {
                --accent: #66ad5b;
                --accent-dark: #569a4c;
                --ink: #2b2b2b;
                --muted: #8a8a8a;
                --surface: #ffffff;
                --shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
                --radius: 16px;
            }
            * { box-sizing: border-box; }
            html, body {
                margin: 0;
                height: 100%;
                overflow: hidden;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                    "Hiragino Sans", "Yu Gothic UI", sans-serif;
                color: var(--ink);
            }
            /* background layer behind the transparent canvas */
            body {
                background: #f5f0e6;
                background-size: cover;
                background-position: center;
                transition: background 0.4s ease;
            }
            #stage { position: fixed; inset: 0; }
            #stage canvas { display: block; }

            /* speech bubble */
            .bubble {
                position: fixed;
                top: 6%;
                left: 50%;
                transform: translateX(-50%) translateY(-8px);
                max-width: min(560px, 80vw);
                max-height: calc(7 * 1.6em + 36px);
                overflow-y: auto;
                padding: 18px 22px;
                background: var(--surface);
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                font-size: 17px;
                line-height: 1.6;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s ease, transform 0.25s ease;
            }
            .bubble.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
                pointer-events: auto;
            }
            .bubble.thinking { color: var(--muted); }
            .bubble::after {
                content: "";
                position: absolute;
                bottom: -10px;
                left: 50%;
                transform: translateX(-50%);
                border-width: 10px 10px 0 10px;
                border-style: solid;
                border-color: var(--surface) transparent transparent transparent;
                filter: drop-shadow(0 4px 3px rgba(0, 0, 0, 0.06));
            }

            /* input bar */
            .input-bar {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                align-items: center;
                gap: 8px;
                width: min(560px, 86vw);
                padding: 8px 8px 8px 18px;
                background: var(--surface);
                border-radius: 999px;
                box-shadow: var(--shadow);
            }
            .input-bar input {
                flex: 1;
                border: none;
                outline: none;
                background: transparent;
                font-size: 16px;
                color: var(--ink);
            }
            .input-bar input::placeholder { color: var(--muted); }
            .send-btn {
                flex: none;
                width: 40px;
                height: 40px;
                border: none;
                border-radius: 50%;
                background: var(--accent);
                color: #fff;
                cursor: pointer;
                display: grid;
                place-items: center;
                transition: background 0.2s ease;
            }
            .send-btn:hover { background: var(--accent-dark); }
            .send-btn svg { width: 18px; height: 18px; }
            .mic-btn { background: #fff; border: 1.5px solid var(--accent); }
            .mic-btn svg { stroke: var(--accent); }
            .mic-btn:hover { background: var(--accent); }
            .mic-btn:hover svg { stroke: #fff; }
            .mic-btn.recording { background: #e53e3e; border-color: #e53e3e; animation: pulse 1s infinite; }
            .mic-btn.recording svg { stroke: #fff; }
            @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

            /* background tool */
            .toolbar { position: fixed; top: 18px; right: 18px; }
            .tool-btn {
                width: 42px;
                height: 42px;
                border: none;
                border-radius: 12px;
                background: var(--surface);
                box-shadow: var(--shadow);
                cursor: pointer;
                display: grid;
                place-items: center;
            }
            .tool-btn svg { width: 20px; height: 20px; stroke: var(--ink); }
            .bg-panel {
                position: fixed;
                top: 70px;
                right: 18px;
                width: 200px;
                padding: 14px;
                background: var(--surface);
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                display: none;
            }
            .bg-panel.show { display: block; }
            .bg-panel h4 {
                margin: 0 0 10px;
                font-size: 13px;
                font-weight: 600;
                color: var(--muted);
            }
            .swatches {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                margin-bottom: 12px;
            }
            .swatch {
                aspect-ratio: 1;
                border-radius: 8px;
                cursor: pointer;
                border: 2px solid rgba(0, 0, 0, 0.06);
                transition: transform 0.15s ease;
            }
            .swatch:hover { transform: scale(1.08); }
            .upload-label {
                display: block;
                text-align: center;
                font-size: 14px;
                padding: 8px;
                background: var(--accent);
                color: #fff;
                border-radius: 8px;
                cursor: pointer;
            }
            .upload-label input { display: none; }
        </style>
    </head>
    <body>
        <div id="stage"></div>
        <div class="bubble" id="bubble"></div>

        <div class="toolbar">
            <button class="tool-btn" id="bgToggle" title="background">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <path d="M21 15l-5-5L5 21" />
                </svg>
            </button>
        </div>

        <div class="bg-panel" id="bgPanel">
            <h4>Background</h4>
            <div class="swatches" id="swatches"></div>
            <label class="upload-label">
                Upload image
                <input type="file" accept="image/*" id="bgUpload" />
            </label>
        </div>

        <div class="input-bar">
            <button class="send-btn mic-btn" id="micBtn" title="音声入力">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="11" rx="3"/>
                    <path d="M5 10a7 7 0 0 0 14 0"/>
                    <line x1="12" y1="19" x2="12" y2="22"/>
                    <line x1="8"  y1="22" x2="16" y2="22"/>
                </svg>
            </button>
            <input id="chatInput" placeholder="メッセージを入力" />
            <button class="send-btn" id="sendBtn" title="送信">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12" />
                    <polyline points="12 5 19 12 12 19" />
                </svg>
            </button>
        </div>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
